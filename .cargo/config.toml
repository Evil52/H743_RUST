[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
# `cargo run [--bin clock]` flashes and streams defmt logs (needs ST-Link/probe).
runner = "probe-rs run --chip STM32H743VITx"
rustflags = [
    "-C", "link-arg=--nmagic",
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
]

[env]
DEFMT_LOG = "info"
# Embassy allocates task futures from this arena.
EMBASSY_EXECUTOR_TASK_ARENA_SIZE = "16384"
